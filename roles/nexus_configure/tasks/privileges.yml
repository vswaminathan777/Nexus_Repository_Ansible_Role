# ----------------------------
# Delete repository-view privileges when drift detected
# ----------------------------
- name: Delete repository-view privilege when drift detected
  ansible.builtin.uri:
    url: "{{ nexus_healthcheck_scheme }}://{{ nexus_healthcheck_host }}:{{ nexus_listen_port }}/service/rest/v1/security/privileges/{{ item.item.name }}"
    method: DELETE
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: [200, 204]
    return_content: true
  loop: "{{ nexus_privilege_current.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - item.status == 200
    - item.item.type == 'repository-view'
    - not (item.json.readOnly | default(false) | bool)
    - >
      (item.json.name | default('')) != (item.item.name | default('')) or
      (item.json.description | default('')) != (item.item.description | default('')) or
      (item.json.format | default('')) != (item.item.format | default('')) or
      (item.json.repository | default('')) != (item.item.repository | default('')) or
      ((item.json.actions | default([]) | map('upper') | list) | sort) !=
      ((item.item.actions | default([]) | map('upper') | list) | sort)
  register: nexus_repository_view_privilege_delete_result
  run_once: true
  no_log: true

- name: Recreate repository-view privilege after drift delete
  ansible.builtin.uri:
    url: "{{ nexus_healthcheck_scheme }}://{{ nexus_healthcheck_host }}:{{ nexus_listen_port }}/service/rest/v1/security/privileges/repository-view"
    method: POST
    user: "{{ nexus_admin_username }}"
    password: "{{ nexus_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      name: "{{ item.item.item.name }}"
      description: "{{ item.item.item.description | default('') }}"
      format: "{{ item.item.item.format }}"
      repository: "{{ item.item.item.repository }}"
      actions: "{{ item.item.item.actions | default([]) | map('upper') | list }}"
    status_code: [200, 201, 204]
    return_content: true
  loop: "{{ nexus_repository_view_privilege_delete_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.name }}"
  when:
    - item.changed | default(false)
  register: nexus_repository_view_privilege_recreate_result
  run_once: true
  no_log: true

