---
- name: Drain node from external load balancer
  ansible.builtin.command: "{{ nexus_lb_drain_command }}"
  when: nexus_lb_drain_command | length > 0
  changed_when: true

- name: Ensure Nexus group exists
  ansible.builtin.group:
    name: "{{ nexus_group }}"
    state: present

- name: Ensure Nexus user exists
  ansible.builtin.user:
    name: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    home: "{{ nexus_home }}"
    shell: >-
      {{
        nexus_user_shell
        if (nexus_user_shell | default('') | length > 0)
        else ('/sbin/nologin' if nexus_use_systemd | bool else '/bin/bash')
      }}
    system: true
    create_home: false
    state: present

- name: Install Java
  ansible.builtin.package:
    name: "{{ nexus_java_package }}"
    state: present
  when: nexus_java_package | default('') | length > 0

- name: Create required directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(nexus_user) }}"
    group: "{{ item.group | default(nexus_group) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: "{{ nexus_install_dir }}", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ nexus_data_dir }}" }
    - { path: "{{ nexus_data_dir }}/etc" }
    - { path: "{{ nexus_data_dir }}/etc/fabric" }
    - { path: "{{ nexus_data_dir }}/tmp" }
    - { path: "{{ nexus_tmp_dir }}", owner: "root", group: "root", mode: "1777" }
    - { path: "{{ nexus_license_dest | dirname }}", owner: "{{ nexus_user }}", group: "{{ nexus_group }}", mode: "0750" }

- name: Create systemd override directory
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ nexus_service_name }}.service.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: nexus_use_systemd | bool

- name: Download Nexus archive
  ansible.builtin.get_url:
    url: "{{ nexus_download_url }}"
    dest: "{{ nexus_archive_path }}"
    mode: "0644"

- name: Check whether requested Nexus version is already extracted
  ansible.builtin.stat:
    path: "{{ nexus_extracted_dir }}/bin/nexus"
  register: nexus_binary

- name: Extract Nexus archive on node
  ansible.builtin.unarchive:
    src: "{{ nexus_archive_path }}"
    dest: "{{ nexus_install_dir }}"
    remote_src: true
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
  when: not nexus_binary.stat.exists

- name: Ensure requested Nexus version ownership
  ansible.builtin.file:
    path: "{{ nexus_extracted_dir }}"
    state: directory
    recurse: true
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
  when: nexus_binary.stat.exists or not nexus_binary.stat.exists

- name: Ensure Nexus data ownership
  ansible.builtin.file:
    path: "{{ nexus_data_dir }}"
    state: directory
    recurse: true
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"

- name: Ensure stable nexus symlink points to requested version
  ansible.builtin.file:
    src: "{{ nexus_extracted_dir }}"
    dest: "{{ nexus_home }}"
    state: link
    force: true
  notify: restart nexus

- name: Configure nexus.rc run user
  ansible.builtin.copy:
    dest: "{{ nexus_home }}/bin/nexus.rc"
    content: |
      run_as_user="{{ nexus_user }}"
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: "0644"
  notify: restart nexus

- name: Configure nexus.properties
  ansible.builtin.template:
    src: nexus.properties.j2
    dest: "{{ nexus_data_dir }}/etc/nexus.properties"
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: "0644"
  notify: restart nexus

- name: Remove legacy top-level nexus-store.properties
  ansible.builtin.file:
    path: "{{ nexus_data_dir }}/etc/nexus-store.properties"
    state: absent
  notify: restart nexus

- name: Configure fabric nexus-store.properties
  ansible.builtin.template:
    src: nexus-store.properties.j2
    dest: "{{ nexus_data_dir }}/etc/fabric/nexus-store.properties"
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: "0640"
  notify: restart nexus

- name: Copy Nexus Pro license
  ansible.builtin.copy:
    src: "{{ nexus_license_src }}"
    dest: "{{ nexus_license_dest }}"
    owner: "{{ nexus_user }}"
    group: "{{ nexus_group }}"
    mode: "0600"
  when:
    - nexus_license_enabled | bool
    - nexus_license_src | length > 0
  notify: restart nexus

- name: Configure systemd override
  ansible.builtin.template:
    src: nexus-systemd-override.conf.j2
    dest: "/etc/systemd/system/{{ nexus_service_name }}.service.d/override.conf"
    owner: root
    group: root
    mode: "0644"
  when: nexus_use_systemd | bool
  notify:
    - daemon reload
    - restart nexus

- name: Flush handlers so service is updated before health checks
  ansible.builtin.meta: flush_handlers

- name: Check whether Nexus is already listening
  ansible.builtin.shell: "ss -ltn | grep ':{{ nexus_listen_port }} '"
  register: nexus_listen
  failed_when: false
  changed_when: false

- name: Remove stale Nexus pid file in non-systemd mode when Nexus is not listening
  ansible.builtin.file:
    path: "{{ nexus_data_dir }}/nexus.pid"
    state: absent
  when:
    - not (nexus_use_systemd | bool)
    - nexus_listen.rc != 0

- name: Remove stale Ehcache lock directory in non-systemd mode when Nexus is not listening
  ansible.builtin.file:
    path: "{{ nexus_data_dir }}/tmp/nexus-ehcache"
    state: absent
  when:
    - not (nexus_use_systemd | bool)
    - nexus_listen.rc != 0

- name: Ensure Nexus service is enabled and started on systemd hosts
  ansible.builtin.systemd:
    name: "{{ nexus_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when: nexus_use_systemd | bool

- name: Start Nexus directly in non-systemd mode
  ansible.builtin.shell: "./bin/nexus start"
  args:
    chdir: "{{ nexus_home }}"
  become: true
  become_user: "{{ nexus_user }}"
  become_method: su
  when:
    - not (nexus_use_systemd | bool)
    - nexus_listen.rc != 0

- name: Wait for Nexus port to be reachable
  ansible.builtin.wait_for:
    host: "{{ nexus_healthcheck_host }}"
    port: "{{ nexus_healthcheck_port }}"
    timeout: 300
    delay: 5

- name: Wait for Nexus to become healthy
  ansible.builtin.uri:
    url: "{{ nexus_healthcheck_scheme }}://{{ nexus_healthcheck_host }}:{{ nexus_healthcheck_port }}{{ nexus_healthcheck_path }}"
    status_code: "{{ nexus_healthcheck_status_code }}"
    timeout: 10
    validate_certs: false
  register: nexus_health
  retries: "{{ nexus_healthcheck_retries }}"
  delay: "{{ nexus_healthcheck_delay }}"
  until: nexus_health.status == nexus_healthcheck_status_code

- name: Add node back to external load balancer
  ansible.builtin.command: "{{ nexus_lb_add_command }}"
  when: nexus_lb_add_command | length > 0
  changed_when: true

